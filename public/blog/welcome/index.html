<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to the blog — Andy Hablewitz</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --paper: #ffffff;
      --ink: #050505;
      --muted: #696969;
      --rule: 2px solid var(--ink);
      --fine: 1px solid var(--ink);
      --accent: #ff3b00;
      --grid: 8px;
      --page-width: 760px;
      --mono: "SFMono-Regular", "SF Mono", Consolas, "Liberation Mono", Menlo, monospace;
      --sans: Helvetica, Arial, sans-serif;
    }

    html {
      font-size: 15px;
      background: var(--paper);
    }

    body {
      min-height: 100vh;
      font-family: var(--sans);
      color: var(--ink);
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    a:focus-visible,
    button:focus-visible {
      outline: 3px solid var(--accent);
      outline-offset: 3px;
    }

    .page {
      width: min(var(--page-width), calc(100% - 48px));
      margin: 0 auto;
      padding: calc(var(--grid) * 7) 0 calc(var(--grid) * 12);
    }

    /* Header */
    .hdr {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: calc(var(--grid) * 3);
      padding-bottom: calc(var(--grid) * 2);
      margin-bottom: calc(var(--grid) * 10);
      border-bottom: var(--rule);
    }
    .hdr a {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
    }

    /* Nav */
    .nav {
      display: flex;
      gap: calc(var(--grid) * 2);
    }
    .nav a {
      position: relative;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .nav a::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: calc(-1 * var(--grid));
      height: 3px;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 120ms linear;
    }
    .nav a:hover,
    .nav a[aria-current="page"] {
      color: var(--ink);
    }
    .nav a:hover::after,
    .nav a[aria-current="page"]::after {
      transform: scaleX(1);
    }

    /* Typography */
    h1 {
      font-size: clamp(2.25rem, 8vw, 5.25rem);
      font-weight: 700;
      line-height: 0.92;
      letter-spacing: -0.075em;
      margin-bottom: calc(var(--grid) * 4);
      text-wrap: balance;
    }

    h2 {
      font-size: clamp(1.5rem, 4vw, 2.25rem);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.05em;
      margin: calc(var(--grid) * 8) 0 calc(var(--grid) * 3);
    }

    h3 {
      font-size: 1.1rem;
      font-weight: 700;
      line-height: 1.3;
      margin: calc(var(--grid) * 5) 0 calc(var(--grid) * 2);
    }

    p {
      font-size: 0.98rem;
      font-weight: 400;
      line-height: 1.7;
      margin-bottom: calc(var(--grid) * 2);
      max-width: 600px;
    }

    strong { font-weight: 700; }

    /* Lists */
    ul, ol {
      list-style: none;
      margin: calc(var(--grid) * 3) 0;
      border-top: var(--fine);
    }
    li {
      display: grid;
      grid-template-columns: 10px 1fr;
      gap: calc(var(--grid) * 2);
      font-size: 0.98rem;
      line-height: 1.6;
      padding: calc(var(--grid) * 1.5) 0;
      border-bottom: var(--fine);
    }
    li::before {
      content: "";
      width: 8px;
      height: 8px;
      margin-top: 0.65em;
      background: var(--accent);
    }

    /* Home */
    .home-name {
      min-height: 52vh;
      display: grid;
      align-content: end;
      padding-bottom: calc(var(--grid) * 4);
      border-bottom: var(--rule);
    }
    .home-name h1 {
      margin-bottom: calc(var(--grid) * 1.5);
    }
    .home-name__sub {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0;
    }
    .home-links {
      margin-top: calc(var(--grid) * 3);
      border-top: var(--rule);
    }
    .home-links a {
      display: grid;
      grid-template-columns: 18px 1fr;
      gap: calc(var(--grid) * 2);
      padding: calc(var(--grid) * 2) 0;
      font-size: clamp(1.15rem, 4vw, 2rem);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.04em;
      border-bottom: var(--fine);
    }
    .home-links a::before {
      content: "↗";
      color: var(--accent);
      font-weight: 400;
      letter-spacing: 0;
    }
    .home-links a:hover {
      background: var(--ink);
      color: var(--paper);
      padding-left: calc(var(--grid) * 2);
    }
    .home-links a:hover::before {
      color: var(--accent);
    }

    /* Blog index */
    .blog-heading {
      padding-bottom: calc(var(--grid) * 6);
      margin-bottom: calc(var(--grid) * 6);
      border-bottom: var(--rule);
    }
    .blog-kicker {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: calc(var(--grid) * 2);
    }
    .blog-heading h1 {
      margin-bottom: calc(var(--grid) * 2);
    }
    .blog-intro {
      max-width: 560px;
      font-size: 1.05rem;
      line-height: 1.65;
    }
    .latest-post {
      display: grid;
      grid-template-columns: 132px 1fr auto;
      gap: calc(var(--grid) * 2);
      align-items: center;
      padding: calc(var(--grid) * 2);
      margin-bottom: calc(var(--grid) * 3);
      border: var(--rule);
      background: var(--paper);
      transition: background-color 120ms linear, color 120ms linear;
    }
    .latest-post:hover {
      background: var(--ink);
      color: var(--paper);
    }
    .latest-post__label,
    .latest-post__date {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .latest-post__title {
      font-size: clamp(1.25rem, 4vw, 2rem);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.05em;
    }
    .post-list {
      margin-top: calc(var(--grid) * 1);
    }
    .post-row {
      display: grid;
      grid-template-columns: 132px 1fr;
      align-items: stretch;
      min-height: calc(var(--grid) * 9);
      margin-bottom: calc(var(--grid) * 1);
      border: var(--fine);
      background: var(--paper);
      transition: background-color 120ms linear, color 120ms linear;
    }
    .post-row:hover {
      background: var(--ink);
      color: var(--paper);
    }
    .post-row__date {
      display: flex;
      align-items: center;
      padding: calc(var(--grid) * 1.5);
      border-right: var(--fine);
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--muted);
    }
    .post-row__title {
      display: flex;
      align-items: center;
      padding: calc(var(--grid) * 1.5);
      font-size: clamp(1.15rem, 3vw, 1.75rem);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.045em;
    }

    /* Blog post */
    .post {
      margin-top: calc(var(--grid) * 2);
    }
    .post-header {
      padding-bottom: calc(var(--grid) * 6);
      margin-bottom: calc(var(--grid) * 8);
      border-bottom: var(--rule);
    }
    .post-date {
      display: inline-flex;
      padding: calc(var(--grid) * 0.75) calc(var(--grid) * 1);
      margin-bottom: calc(var(--grid) * 3);
      border: var(--fine);
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--paper);
    }
    .post-title {
      max-width: 720px;
      font-size: clamp(2rem, 7vw, 4.25rem);
      font-weight: 700;
      line-height: 0.98;
      letter-spacing: -0.065em;
      text-wrap: balance;
    }
    .post-body {
      max-width: 640px;
    }
    .post-body p {
      max-width: none;
    }
    .post-body h2,
    .post-body h3 {
      max-width: 640px;
    }

    /* Footer */
    .ftr {
      display: flex;
      justify-content: space-between;
      gap: calc(var(--grid) * 2);
      padding-top: calc(var(--grid) * 2);
      margin-top: calc(var(--grid) * 12);
      border-top: var(--rule);
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .ftr::after {
      content: "INDEX / POSTS / ARCHIVE";
      color: var(--ink);
    }

    /* Responsive */
    @media (max-width: 600px) {
      .page { width: min(100% - 32px, var(--page-width)); }
      .hdr {
        grid-template-columns: 1fr;
        align-items: start;
      }
      .nav {
        flex-wrap: wrap;
        gap: calc(var(--grid) * 2) calc(var(--grid) * 3);
      }
      .latest-post {
        grid-template-columns: 1fr;
        gap: calc(var(--grid) * 1);
      }
      .post-row {
        grid-template-columns: 1fr;
      }
      .post-row__date {
        border-right: 0;
        border-bottom: var(--fine);
      }
      .home-name { min-height: 48vh; }
      .home-links a {
        grid-template-columns: 1fr;
        padding-left: calc(var(--grid) * 2);
      }
      .home-links a:hover { padding-left: calc(var(--grid) * 2); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="hdr">
      <a href="/">Andy Hablewitz</a>
      <nav class="nav">
        <a href="/" >Home</a>
        <a href="/blog/" aria-current="page">Blog</a>
        <a href="/resume/" >Resume</a>
      </nav>
    </header>

    <main>
      
<article class="post">
  <header class="post-header">
    <p class="post-date">2026-05-26</p>
    <h1 class="post-title">Welcome to the blog</h1>
  </header>

  <div class="post-body">
    <p>This is the first post.</p>

  </div>
</article>

    </main>

    <footer class="ftr">
      &copy;  Andy Hablewitz
    </footer>
  </div>
</body>
</html>
