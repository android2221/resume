<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — Andy Hablewitz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --black: #000000;
      --white: #FFFFFF;
      --gray: #888888;
      --light-gray: #E5E5E5;
      --max-width: 680px;
      --font-display: 'Inter', Helvetica, Arial, sans-serif;
      --font-mono: 'JetBrains Mono', 'Courier New', monospace;
    }

    html { font-size: 16px; -webkit-font-smoothing: antialiased; }

    body {
      font-family: var(--font-display);
      color: var(--black);
      background: var(--white);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Layout ── */
    .page {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 80px 24px 120px;
    }

    /* ── Header ── */
    .site-header {
      padding: 32px 0 80px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .site-header__name {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--black);
      text-decoration: none;
    }

    .site-header__name:hover { color: var(--gray); }

    .site-header__nav {
      display: flex;
      gap: 32px;
    }

    .site-header__nav a {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gray);
      text-decoration: none;
    }

    .site-header__nav a:hover,
    .site-header__nav a[aria-current="page"] {
      color: var(--black);
    }

    /* ── Typography ── */
    h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -0.03em;
      margin-bottom: 40px;
    }

    h2 {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin: 64px 0 24px;
    }

    h3 {
      font-size: 1rem;
      font-weight: 700;
      margin: 40px 0 16px;
    }

    p {
      font-size: 1rem;
      font-weight: 300;
      line-height: 1.75;
      margin-bottom: 24px;
      color: var(--black);
    }

    a {
      color: var(--black);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    a:hover { color: var(--gray); }

    /* ── Lists ── */
    ul, ol {
      list-style: none;
      margin: 24px 0;
    }

    ul li {
      font-size: 1rem;
      font-weight: 300;
      line-height: 1.75;
      padding: 8px 0;
      border-bottom: 1px solid var(--light-gray);
    }

    ul li:last-child { border-bottom: none; }

    /* ── Label / Meta ── */
    .label {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gray);
    }

    /* ── Divider ── */
    .divider {
      border: none;
      border-top: 1px solid var(--light-gray);
      margin: 64px 0;
    }

    /* ── Footer ── */
    .site-footer {
      margin-top: 120px;
      padding-top: 32px;
      border-top: 1px solid var(--light-gray);
    }

    .site-footer__text {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      color: var(--gray);
    }

    /* ── Home page ── */
    .hero {
      padding: 40px 0 80px;
    }

    .hero__title {
      font-size: clamp(2.5rem, 7vw, 5rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.04em;
      margin-bottom: 16px;
    }

    .hero__subtitle {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gray);
    }

    .home-links {
      margin-top: 64px;
    }

    .home-links a {
      display: block;
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      text-decoration: none;
      padding: 16px 0;
      border-bottom: 1px solid var(--light-gray);
      transition: padding-left 0.2s ease;
    }

    .home-links a:first-child { border-top: 1px solid var(--light-gray); }

    .home-links a:hover {
      padding-left: 16px;
      color: var(--black);
    }

    /* ── Blog index ── */
    .post-list { margin-top: 40px; }

    .post-item {
      display: flex;
      align-items: baseline;
      gap: 24px;
      padding: 24px 0;
      border-bottom: 1px solid var(--light-gray);
      text-decoration: none;
      color: var(--black);
    }

    .post-item:first-child { border-top: 1px solid var(--light-gray); }

    .post-item:hover { color: var(--gray); }

    .post-item__date {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      font-weight: 400;
      color: var(--gray);
      flex-shrink: 0;
      min-width: 100px;
    }

    .post-item__title {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    /* ── Post page ── */
    .post-header { margin-bottom: 64px; }

    .post-header__date {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      font-weight: 400;
      color: var(--gray);
      margin-bottom: 24px;
    }

    .post-header__title {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -0.03em;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .page { padding: 40px 20px 80px; }
      .site-header { padding-bottom: 48px; }
      .post-item { flex-direction: column; gap: 8px; }
    }

    /* ── Reduced motion ── */
    @media (prefers-reduced-motion: reduce) {
      .home-links a { transition: none; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="site-header">
      <a href="/" class="site-header__name">Andy Hablewitz</a>
      <nav class="site-header__nav">
        <a href="/" >Home</a>
        <a href="/blog/" aria-current="page">Blog</a>
        <a href="/resume/" >Resume</a>
      </nav>
    </header>

    <main>
      
<h1>Blog</h1>
<div class="post-list">
  
</div>

    </main>

    <footer class="site-footer">
      <span class="site-footer__text">&copy;  Andy Hablewitz</span>
    </footer>
  </div>
</body>
</html>
