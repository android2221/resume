version: '3.6'
services:
  build-resume:
    image: node:10.15.3
    working_dir: /code/
    volumes:
      - ./:/code/
      - ../../public:/save-dir/
    environment:
      - RENDER_FILE_LOCATION=/code/Resume.md
    command: >
      bash -c '
        npm install && npm start && \
        cd /code/src/blog && npm install && npx eleventy && \
        rm -rf ./node_modules && echo "Cleared node_modules"
      '
    